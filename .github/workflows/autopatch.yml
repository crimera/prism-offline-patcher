name: Check & Build & Release

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force upstream tag (e.g. 10.0.5). Leave empty to auto-detect."
        required: false

permissions:
  contents: write
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Detect whether a new upstream version exists
  # ─────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.upstream.outputs.tag }}
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - name: Get latest upstream tag
        id: upstream
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            TAG="${{ github.event.inputs.force_version }}"
          else
            TAG=$(curl -sf "https://api.github.com/repos/PrismLauncher/PrismLauncher/releases/latest" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              | jq -r '.tag_name')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Upstream latest: $TAG"

      - name: Check if already released
        id: check
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version $TAG, proceeding with build."
          fi

  # ─────────────────────────────────────────────
  # 2. Build patched binaries (macOS + Windows)
  # ─────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.skip == 'false'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact-name: macOS
            cmake-preset: macos_universal
            macosx-deployment-target: "12.0"
            qt-version: "6.9.3"

          - os: windows-2022
            artifact-name: Windows-MSVC
            cmake-preset: windows_msvc
            vcvars-arch: amd64
            qt-version: "6.10.2"

    runs-on: ${{ matrix.os }}

    env:
      TAG: ${{ needs.check.outputs.tag }}
      BUILD_DIR: build
      INSTALL_DIR: install
      BUILD_TYPE: Release
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx-deployment-target }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout patcher repo
        uses: actions/checkout@v4
        with:
          path: patcher

      - name: Clone Prism Launcher at upstream tag
        run: |
          git clone --depth 1 --branch "$TAG" \
            https://github.com/PrismLauncher/PrismLauncher.git prism-src
          echo "Cloned @ $TAG"

      - name: Apply offline patches
        run: |
          cd prism-src
          git apply --whitespace=nowarn ../patcher/patches/0001-ownsMinecraft-always-true.patch
          git apply --whitespace=nowarn ../patcher/patches/0002-anyAccountIsValid-always-true.patch
          git apply --whitespace=nowarn ../patcher/patches/0003-decideLaunchMode-skip-auth.patch
          echo "All patches applied."

      # ── macOS deps ──────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja extra-cmake-modules temurin@17 mono
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 17)" >> "$GITHUB_ENV"

      - name: Setup vcpkg (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> "$GITHUB_ENV"

      - name: Export GitHub Actions cache variables (macOS)
        if: runner.os == 'macOS'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── Windows deps ─────────────────────────────
      - name: Enter VS Developer shell (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.vcvars-arch }}
          vsversion: "2022"

      - name: Setup Java (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -Append $env:GITHUB_ENV
          "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" | Out-File -Append $env:GITHUB_ENV

      - name: Export GitHub Actions cache variables (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── Build ────────────────────────────────────
      - name: Configure
        working-directory: prism-src
        run: cmake --preset "${{ matrix.cmake-preset }}"

      - name: Build
        working-directory: prism-src
        run: cmake --build --preset "${{ matrix.cmake-preset }}" --config "$BUILD_TYPE"

      # ── Package: macOS ───────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: prism-src
        run: |
          cmake --install "$BUILD_DIR" --config "$BUILD_TYPE"

          cd "$INSTALL_DIR"
          chmod +x "PrismLauncher.app/Contents/MacOS/prismlauncher"

          # Ad-hoc sign (no Apple cert)
          sudo codesign --sign "-" --deep --force \
            --entitlements "../program_info/AdhocSignedApp.entitlements" \
            --options runtime \
            "PrismLauncher.app/Contents/MacOS/prismlauncher"

          mv "PrismLauncher.app" "Prism Launcher.app"

          # Create .zip
          ditto -c -k --sequesterRsrc --keepParent "Prism Launcher.app" \
            "../../PrismLauncher-macOS-${{ env.TAG }}.zip"

          # Create .dmg
          mkdir -p dmg-src
          cp -R "Prism Launcher.app" dmg-src/
          ln -s /Applications dmg-src/
          hdiutil create \
            -volname "Prism Launcher ${{ env.TAG }}" \
            -srcfolder dmg-src \
            -ov -format ULMO \
            "../../PrismLauncher-macOS-${{ env.TAG }}.dmg"

      # ── Package: Windows ─────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: prism-src
        shell: pwsh
        run: |
          cmake --install $env:BUILD_DIR --config $env:BUILD_TYPE
          Compress-Archive -Path "$env:INSTALL_DIR\*" `
            -DestinationPath "..\..\PrismLauncher-Windows-MSVC-${{ env.TAG }}.zip"

      # ── Upload artifacts ─────────────────────────
      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ env.TAG }}
          path: |
            PrismLauncher-macOS-${{ env.TAG }}.zip
            PrismLauncher-macOS-${{ env.TAG }}.dmg

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ env.TAG }}
          path: PrismLauncher-Windows-MSVC-${{ env.TAG }}.zip

  # ─────────────────────────────────────────────
  # 3. Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────
  release:
    needs: [check, build]
    runs-on: ubuntu-latest

    env:
      TAG: ${{ needs.check.outputs.tag }}

    steps:
      - name: Checkout patcher repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build combined patch file
        run: cat patches/*.patch > "offline-patches-${TAG}.patch"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "PrismLauncher ${{ env.TAG }} (Offline Patched)"
          body: |
            Auto-patched from [PrismLauncher ${{ env.TAG }}](https://github.com/PrismLauncher/PrismLauncher/releases/tag/${{ env.TAG }}).

            ### What's changed (3 patches)
            | File | Change |
            |------|--------|
            | `launcher/minecraft/auth/MinecraftAccount.h` | `ownsMinecraft()` always returns `true` |
            | `launcher/minecraft/auth/AccountList.cpp` | `anyAccountIsValid()` always returns `true` |
            | `launcher/LaunchController.cpp` | `decideLaunchMode()` skips all auth checks |

            ### Downloads
            | File | Platform |
            |------|----------|
            | `PrismLauncher-macOS-*.dmg` | macOS (Universal, ad-hoc signed) |
            | `PrismLauncher-macOS-*.zip` | macOS (app bundle zip) |
            | `PrismLauncher-Windows-MSVC-*.zip` | Windows x64 |
            | `offline-patches-*.patch` | Unified diff — apply with `git apply` |
          files: |
            artifacts/PrismLauncher-macOS-${{ env.TAG }}.dmg
            artifacts/PrismLauncher-macOS-${{ env.TAG }}.zip
            artifacts/PrismLauncher-Windows-MSVC-${{ env.TAG }}.zip
            offline-patches-${{ env.TAG }}.patch
